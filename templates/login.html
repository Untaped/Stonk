<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LitlGuy</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-gray-800 p-8 rounded-lg shadow-lg w-full max-w-md border border-gray-700">
        <h2 class="text-3xl font-bold mb-6 text-center text-blue-400">Welcome Back</h2>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="bg-red-900 border border-red-500 text-red-100 p-3 rounded mb-4 text-center">
              {{ messages[0] }}
            </div>
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST" class="space-y-4">
            <div>
                <label class="block text-gray-400 text-sm font-bold mb-2">Username</label>
                <input type="text" name="username" required class="w-full p-3 rounded bg-gray-700 text-white border border-gray-600 focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-gray-400 text-sm font-bold mb-2">Password</label>
                <input type="password" name="password" required class="w-full p-3 rounded bg-gray-700 text-white border border-gray-600 focus:outline-none focus:border-blue-500">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded transition duration-200">
                Log In
            </button>
        </form>
        <p class="mt-4 text-center text-gray-400">
            Don't have an account? <a href="{{ url_for('register') }}" class="text-blue-400 hover:underline">Register here</a>.
        </p>
    </div>
</body>
</html>
    <script>
    // --- UI Sound Effects (Web Audio API) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function playClickSound() {
        if (!audioCtx) {
            audioCtx = new AudioContext();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        
        const now = audioCtx.currentTime;

        // Tone 1: The High "Click"
        const osc1 = audioCtx.createOscillator();
        const gain1 = audioCtx.createGain();
        osc1.type = 'sine'; 
        osc1.frequency.setValueAtTime(400, now); 
        osc1.frequency.exponentialRampToValueAtTime(800, now + 0.03); 
        gain1.gain.setValueAtTime(0.15, now); 
        gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.03); 
        osc1.connect(gain1);
        gain1.connect(audioCtx.destination);
        osc1.start(now);
        osc1.stop(now + 0.02); 

        // Tone 2: The Low "Thock"
        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();
        const delay = 0.0005; 
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(300, now + delay); 
        osc2.frequency.exponentialRampToValueAtTime(150, now + delay + 0.04); 
        gain2.gain.setValueAtTime(0, now); 
        gain2.gain.setValueAtTime(0.15, now + delay); 
        gain2.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.04); 
        osc2.connect(gain2);
        gain2.connect(audioCtx.destination);
        osc2.start(now + delay);
        osc2.stop(now + delay + 0.04); 
    }

    // Automatically attach the sound to tabs, buttons, and links
    document.addEventListener('DOMContentLoaded', () => {
        // I added 'li' and '.nav-item' here just in case your tabs use list elements
        const clickableElements = document.querySelectorAll('button, a, .cursor-pointer, input[type="submit"], li, .nav-item');
        
        clickableElements.forEach(el => {
            el.addEventListener('click', function(e) {
                // 1. Play the sound immediately
                playClickSound();

                // 2. Check if this element is a link going to another page
                if (this.tagName.toLowerCase() === 'a' && this.href && !this.href.includes('#')) {
                    // Stop the browser from leaving the page instantly
                    e.preventDefault();
                    
                    const targetUrl = this.href;

                    // Wait 100 milliseconds for the sound to finish, then go to the new page
                    setTimeout(() => {
                        window.location.href = targetUrl;
                    }, 100);
                }
            });
        });
    });
</script>
